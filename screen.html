<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班级大屏通知列表</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <script>
        tailwind.config={
            theme:{extend:{colors:{primary:'#1E88E5',urgent:'#e53e3e',important:'#f97316'}}}
        }
    </script>
    <style>
        body{overflow:hidden;height:100vh;}
        ::-webkit-scrollbar {width: 6px;}
        ::-webkit-scrollbar-thumb {background: #ccc;border-radius:3px;}
    </style>
</head>
<body class="flex flex-col w-full h-full bg-slate-100">
    <header class="bg-primary text-white px-8 py-4 flex justify-between items-center shadow">
        <div class="text-2xl font-bold"><i class="fa fa-bullhorn mr-2"></i>班级通知公告</div>
        <div class="text-xl" id="nowTime"></div>
    </header>

    <main class="flex-1 p-6 overflow-y-auto">
        <div id="listBox" class="w-full max-w-6xl mx-auto space-y-4"></div>
    </main>

    <footer class="bg-white px-8 py-3 shadow-inner">
        <div class="flex justify-between items-center">
            <span class="text-green-600">实时同步中</span>
            <span class="text-gray-500 text-sm">© 2025 北二外成都附中 版权所有</span>
        </div>
    </footer>

<script>
const STORAGE_KEY = 'class_msg_data';

// 读取消息
function getMsg() {
    const data = localStorage.getItem(STORAGE_KEY);
    return data ? JSON.parse(data) : [];
}

// 渲染列表
function render() {
    const msgArr = getMsg();
    const box = document.getElementById("listBox");

    if (msgArr.length === 0) {
        box.innerHTML = `<div class="bg-white rounded-lg p-10 text-center text-gray-400 text-2xl shadow">暂无通知，等待老师发布</div>`;
        return;
    }

    let html = "";
    msgArr.forEach(item => {
        let headColor = "bg-primary";
        if (item.type === "urgent") headColor = "bg-urgent";
        if (item.type === "important") headColor = "bg-important";
        
        const pinBadge = item.pinned ? '<span class="bg-yellow-400 text-black text-sm px-3 rounded ml-3">置顶</span>' : '';

        html += `
        <div class="bg-white rounded-lg shadow-lg overflow-hidden">
            <div class="${headColor} text-white px-6 py-3 flex justify-between items-center">
                <div class="text-xl font-bold">${item.title} ${pinBadge}</div>
                <div class="text-sm">${item.time}</div>
            </div>
            <div class="px-6 py-5 text-lg whitespace-pre-wrap">${item.content}</div>
        </div>`;
    });
    box.innerHTML = html;
}

// 实时时间
setInterval(() => {
    document.getElementById("nowTime").innerText = new Date().toLocaleString('zh-CN');
}, 1000);

// 2秒同步一次
setInterval(render, 2000);
render();
</script>
</body>
</html>
