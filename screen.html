<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班级大屏通知</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <script src="https://cdn.jsdelivr.net/npm/socket.io-client@4.8.1/dist/socket.io.min.js"></script>
    <style>
        body{overflow:hidden;height:100vh}
        ::-webkit-scrollbar{width:6px}
    </style>
</head>
<body class="flex flex-col h-screen bg-slate-100">
<header class="bg-blue-600 text-white px-6 py-4 flex justify-between items-center">
    <div class="text-2xl font-bold">📢 班级通知公告</div>
    <div id="time" class="text-xl"></div>
</header>

<main class="flex-1 p-6 overflow-y-auto">
    <div id="box" class="max-w-6xl mx-auto space-y-4"></div>
</main>

<footer class="bg-white p-3 flex justify-between items-center">
    <span class="text-green-600">✅ 实时同步中</span>
    <span class="text-gray-500 text-sm">© 2025 北二外成都附中 版权所有</span>
</footer>

<script>
const socket = io('wss://echo.websocket.events');
let list = [];

// 实时接收消息
socket.on('msg', (data) => {
    list.unshift(data);
    render();
});

// 清空同步
socket.on('clear', () => {
    list = [];
    render();
});

// 渲染列表
function render() {
    if (list.length === 0) {
        document.getElementById('box').innerHTML = `<div class="text-center text-gray-400 text-2xl p-10 bg-white rounded">暂无通知</div>`;
        return;
    }

    let html = '';
    list.forEach(item => {
        let color = 'bg-blue-600';
        if (item.type === 'urgent') color = 'bg-red-600';
        if (item.type === 'important') color = 'bg-orange-500';
        const pin = item.pinned ? '<span class="bg-yellow-400 text-black px-2 rounded text-sm ml-2">置顶</span>' : '';

        html += `
        <div class="bg-white rounded-lg shadow-lg overflow-hidden">
            <div class="${color} text-white p-4 flex justify-between">
                <div class="text-xl font-bold">${item.title} ${pin}</div>
                <div class="text-sm">${item.time}</div>
            </div>
            <div class="p-6 text-lg">${item.content}</div>
        </div>`;
    });
    document.getElementById('box').innerHTML = html;
}

// 时间
setInterval(() => {
    document.getElementById('time').innerText = new Date().toLocaleString('zh-CN');
}, 1000);

render();
</script>
</body>
</html>
