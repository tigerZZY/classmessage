<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班级大屏通知</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <style>
        body{overflow:hidden;height:100vh}
        ::-webkit-scrollbar{width:6px}
    </style>
    <script>
        tailwind.config={theme:{extend:{colors:{primary:'#1E88E5',urgent:'#e53e3e',important:'#f97316'}}}}
    </script>
</head>
<body class="flex flex-col h-screen bg-slate-100">
<header class="bg-primary text-white px-6 py-4 flex justify-between items-center">
    <div class="text-2xl font-bold">📢 班级通知公告</div>
    <div id="time" class="text-xl"></div>
</header>

<main class="flex-1 p-6 overflow-y-auto">
    <div id="box" class="max-w-6xl mx-auto space-y-4"></div>
</main>

<footer class="bg-white p-3 flex justify-between items-center">
    <span class="text-green-600">✅ 云端实时同步中</span>
    <span class="text-gray-500 text-sm">© 2025 北二外成都附中 版权所有</span>
</footer>

<script>
const API_URL = "https://api.jsonbin.io/v3/b/67a6d7a4acd7837645a12345";

// 获取云端消息
async function getMsg() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();
    return data.record || [];
  } catch (e) {
    return [];
  }
}

// 渲染列表
async function render() {
  const list = await getMsg();
  const box = document.getElementById("box");

  if (list.length === 0) {
    box.innerHTML = `<div class="text-center text-gray-400 text-2xl p-10 bg-white rounded">暂无通知，等待老师发布</div>`;
    return;
  }

  let html = "";
  list.forEach(item => {
    let color = "bg-primary";
    if (item.type === "urgent") color = "bg-urgent";
    if (item.type === "important") color = "bg-important";
    const pin = item.pinned ? '<span class="bg-yellow-400 text-black px-2 rounded text-sm ml-2">置顶</span>' : '';

    html += `
    <div class="bg-white rounded-lg shadow-lg overflow-hidden">
      <div class="${color} text-white p-4 flex justify-between">
        <div class="text-xl font-bold">${item.title} ${pin}</div>
        <div class="text-sm">${item.time}</div>
      </div>
      <div class="p-6 text-lg whitespace-pre-wrap">${item.content}</div>
    </div>`;
  });
  box.innerHTML = html;
}

// 实时时间
setInterval(() => {
  document.getElementById("time").innerText = new Date().toLocaleString('zh-CN');
}, 1000);

// 3秒同步一次（全设备通用）
setInterval(render, 3000);
render();
</script>
</body>
</html>
