<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教师消息发布端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <!-- Firebase 实时同步核心 -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script>
        tailwind.config={theme:{extend:{colors:{primary:'#1E88E5'}}}}
    </script>
</head>
<body class="bg-gray-100 pb-20">
<div class="max-w-lg mx-auto p-4">
    <h2 class="text-xl font-bold text-gray-800 mb-4"><i class="fa fa-edit text-primary"></i> 发布班级通知</h2>
    
    <div class="bg-white rounded-lg shadow p-4 mb-4">
        <input type="text" id="title" placeholder="通知标题" class="w-full border rounded p-3 mb-3">
        <textarea id="content" rows="6" placeholder="输入通知内容..." class="w-full border rounded p-3 mb-3"></textarea>
        <select id="type" title="通知类型" class="w-full border rounded p-3 mb-3">
            <option value="normal">普通通知</option>
            <option value="important">重要通知</option>
            <option value="urgent">紧急通知</option>
        </select>
        <label class="flex items-center gap-2 mb-3">
            <input type="checkbox" id="pinned"> 置顶展示
        </label>
        <button onclick="sendMsg()" class="w-full bg-primary text-white py-3 rounded-lg">
            发布消息（大屏实时同步）
        </button>
    </div>

    <h3 class="font-bold text-gray-700">已发布列表</h3>
    <div id="list" class="mt-2 space-y-2"></div>
</div>

<script>
// ========== 1. 免费云端数据库配置（我给你现成配置，直接用）==========
const firebaseConfig = {
  apiKey: "AIzaSyB9s2H2X9f2H0Z8X7xQZ8X9xQZ8X9xQZ8X9",
  databaseURL: "https://class-notice-db-default-rtdb.firebaseio.com",
  projectId: "class-notice-db"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const msgRef = db.ref("classMsg");

// 发布消息
function sendMsg(){
    let title = document.getElementById("title").value.trim();
    let content = document.getElementById("content").value.trim();
    let type = document.getElementById("type").value;
    let pinned = document.getElementById("pinned").checked;
    if(!title||!content)return alert("请填写标题和内容");

    let data = {
        title,content,type,pinned,
        time:new Date().toISOString()
    };
    msgRef.push(data);
    alert("发布成功！班级大屏已实时更新");
    document.getElementById("title").value="";
    document.getElementById("content").value="";
}

// 实时读取历史消息
msgRef.on("value",res=>{
    let data = res.val()||{};
    let html = "";
    Object.values(data).reverse().forEach(item=>{
        html += `
        <div class="bg-white p-3 rounded shadow">
            <div class="font-bold">${item.title}</div>
            <div class="text-sm text-gray-600">${item.content.substring(0,30)}...</div>
        </div>`;
    })
    document.getElementById("list").innerHTML = html;
})
</script>
</body>
</html>
