<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教师发布端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <script src="https://cdn.jsdelivr.net/npm/socket.io-client@4.8.1/dist/socket.io.min.js"></script>
</head>
<body class="bg-gray-100 p-4 pb-8 flex flex-col min-h-screen">
<div class="max-w-lg mx-auto flex-1">
    <h2 class="text-xl font-bold mb-4">📱 教师发布通知</h2>
    <div class="bg-white p-4 rounded-lg shadow">
        <input type="text" id="title" placeholder="通知标题" class="w-full border p-3 rounded mb-3">
        <textarea id="content" rows="5" placeholder="输入通知内容..." class="w-full border p-3 rounded mb-3"></textarea>
        <div class="flex gap-2 mb-3">
            <select id="type" class="flex-1 border p-3 rounded">
                <option value="normal">普通通知</option>
                <option value="important">重要通知</option>
                <option value="urgent">紧急通知</option>
            </select>
            <label class="flex items-center gap-1">
                <input type="checkbox" id="pinned"> 置顶
            </label>
        </div>
        <button onclick="sendMsg()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold">
            发布（全设备同步）
        </button>
    </div>
    <div class="mt-4 flex justify-between items-center">
        <h3 class="font-bold">通知列表</h3>
        <button onclick="clearMsg()" class="text-red-500 text-sm">一键清空</button>
    </div>
    <div id="list" class="mt-2 space-y-2"></div>
</div>
<div class="text-center text-gray-500 text-sm mt-6">© 2025 北二外成都附中 版权所有</div>

<script>
const socket = io('wss://echo.websocket.events');
let msgList = [];

// 发送消息
function sendMsg() {
    const title = document.getElementById('title').value.trim();
    const content = document.getElementById('content').value.trim();
    const type = document.getElementById('type').value;
    const pinned = document.getElementById('pinned').checked;
    
    if (!title || !content) return alert('请填写完整内容');
    
    const msg = {
        id: Date.now(), title, content, type, pinned,
        time: new Date().toLocaleString('zh-CN')
    };
    
    socket.emit('msg', msg);
    alert('发布成功！全设备已同步');
    document.getElementById('title').value = '';
    document.getElementById('content').value = '';
}

// 接收同步
socket.on('msg', (msg) => {
    msgList.unshift(msg);
    render();
});

// 渲染列表
function render() {
    let html = '';
    msgList.forEach(item => {
        html += `
        <div class="bg-white p-3 rounded shadow">
            <div class="font-bold">${item.title}</div>
            <div class="text-xs text-gray-500">${item.time}</div>
        </div>`;
    });
    document.getElementById('list').innerHTML = html;
}

// 清空
function clearMsg() {
    if (confirm('清空所有通知？')) {
        msgList = [];
        socket.emit('clear', true);
        render();
    }
}

socket.on('clear', () => {
    msgList = [];
    render();
});
</script>
</body>
</html>
