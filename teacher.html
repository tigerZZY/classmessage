<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教师发布端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <script>tailwind.config={theme:{extend:{colors:{primary:'#1E88E5'}}}}</script>
</head>
<body class="bg-gray-100 p-4 pb-8 flex flex-col min-h-screen">
<div class="max-w-lg mx-auto flex-1">
    <h2 class="text-xl font-bold mb-4">📱 教师发布通知</h2>
    <div class="bg-white p-4 rounded-lg shadow">
        <input type="text" id="title" placeholder="通知标题" class="w-full border p-3 rounded mb-3">
        <textarea id="content" rows="5" placeholder="输入通知内容..." class="w-full border p-3 rounded mb-3"></textarea>
        <div class="flex gap-2 mb-3">
            <select id="type" class="flex-1 border p-3 rounded">
                <option value="normal">普通通知</option>
                <option value="important">重要通知</option>
                <option value="urgent">紧急通知</option>
            </select>
            <label class="flex items-center gap-1">
                <input type="checkbox" id="pinned"> 置顶
            </label>
        </div>
        <button onclick="pushMsg()" class="w-full bg-primary text-white py-3 rounded-lg font-bold">
            发布并同步至大屏
        </button>
    </div>

    <div class="mt-4 flex justify-between items-center">
        <h3 class="font-bold">通知列表</h3>
        <button onclick="clearAll()" class="text-red-500 text-sm">一键清空</button>
    </div>
    <div id="list" class="mt-2 space-y-2"></div>
</div>
<div class="text-center text-gray-500 text-sm mt-6">© 2025 北二外成都附中 版权所有</div>

<script>
// 专属稳定云端接口（唯一数据中心，全设备同步）
const API_URL = "https://api.jsonbin.io/v3/b/67a6d7a4acd7837645a12345";
const API_KEY = "$2a$10$YOUR_API_KEY";

// 获取云端数据
async function getCloudData() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();
    return data.record || [];
  } catch (e) {
    return [];
  }
}

// 保存到云端
async function saveCloudData(list) {
  await fetch(API_URL, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      "X-Master-Key": API_KEY
    },
    body: JSON.stringify(list)
  });
}

// 发布消息
async function pushMsg() {
  const title = document.getElementById("title").value.trim();
  const content = document.getElementById("content").value.trim();
  const type = document.getElementById("type").value;
  const pinned = document.getElementById("pinned").checked;

  if (!title || !content) {
    alert("请填写标题和内容！");
    return;
  }

  const list = await getCloudData();
  list.unshift({
    id: Date.now(),
    title, content, type, pinned,
    time: new Date().toLocaleString('zh-CN')
  });

  await saveCloudData(list);
  alert("发布成功！全设备已同步！");
  document.getElementById("title").value = "";
  document.getElementById("content").value = "";
  renderList();
}

// 渲染列表
async function renderList() {
  const list = await getCloudData();
  let html = "";
  list.forEach(item => {
    html += `
    <div class="bg-white p-3 rounded shadow flex justify-between items-center">
      <div>
        <div class="font-semibold">${item.title}</div>
        <div class="text-xs text-gray-500">${item.time}</div>
      </div>
      <button onclick="delMsg(${item.id})" class="text-red-400">删除</button>
    </div>`;
  });
  document.getElementById("list").innerHTML = html;
}

// 删除单条
async function delMsg(id) {
  let list = await getCloudData();
  list = list.filter(x => x.id !== id);
  await saveCloudData(list);
  renderList();
}

// 清空全部
async function clearAll() {
  if (confirm("确定清空所有通知？")) {
    await saveCloudData([]);
    renderList();
  }
}

// 初始化
renderList();
setInterval(renderList, 3000);
</script>
</body>
</html>
